services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/imobtech
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-imobtech-dev-secret-key}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imobtech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imobtech"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
